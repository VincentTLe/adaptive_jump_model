[scope]
markets = ["us", "de", "jp"]
evaluation_start = { us = "2007-12-04", de = "2008-01-03", jp = "2009-05-07" }
evaluation_end = "last available candidate date no later than 2023-12-31"
features = ["dd_10", "sortino_20", "sortino_60"]
fit_window_observations = 3000
jm_refit_months = [1, 7]
performance_files_accessed = false
return_columns_accessed = false

[penalty]
objective = "sum_t L_t(s_t) + sum_t>=1 C_t(s_(t-1),s_t)"
alpha = "1-exp(-beta)"
signed_evidence = "h_t(i,j)=tanh((L_(t-1)(i)-L_(t-1)(j))/q_train)"
formula = "lambda0*(1-(1-exp(-beta))*h_t(i,j)) for i!=j; zero diagonal"
initial_penalty = "fixed-lambda matrix at t=0; no incoming transition is charged at t=0"
missing_state_rule = "replace unavailable loss by +infinity; if both directed losses are unavailable set the signed gap to zero; every row must have at least one finite state loss"
beta = [0.0, 1.3862943611198906]
decision_beta = 1.3862943611198906
q_train = "exact sealed positive raw MAD from the 3000-row training prefix for each refit and lambda"
refit_convention = "on a Jan/Jul fit date, recompute the t-1 loss under scaler and centers fitted through t, matching the sealed lagged source"
information_claim = "causal at t; not strictly F_(t-1)-predictable on a refit date"

[mathematics]
beta_zero = "beta=0 is bit-exact fixed JM"
pair_balance = "C_t(i,j)+C_t(j,i)=2*lambda0 for every unordered pair"
bounds = "lambda0*exp(-beta) <= C_t(i,j) <= lambda0*(2-exp(-beta))"
monotonicity = "C_t(i,j) is non-increasing in L_(t-1)(i)-L_(t-1)(j)"
scale_invariance = "common positive scaling of losses and q_train leaves penalties unchanged"
objective_bound = "for the same fixed state path s with N(s) switches at one fixed candidate lambda, abs(J_balanced(s)-J_fixed(s)) <= N(s)*lambda0*(1-exp(-beta))"
forward_discount = "for evidence x in [0,1], 1-(1-exp(-beta))*x >= exp(-beta*x); balanced never discounts the favored direction more than one-sided lagged, with equality at x=0 or x=1"
complexity = "the additive dynamic program remains exact O(T*K^2)"
binary_hysteresis_width = "for two states, d_t=g_t+clip(d_(t-1),-C_t(1,0),C_t(0,1)); pair balance keeps the clipping-interval width exactly 2*lambda0"

[candidates]
raw_lambda_grid = [0.0, 5.0, 15.0, 35.0, 70.0, 150.0, 300.0, 600.0, 1200.0]
event_lambda_grid = [5.0, 15.0, 35.0, 70.0, 150.0, 300.0, 600.0, 1200.0]
rules = ["lagged", "balanced"]
raw_grid_expansion = false
beta_selected_by_performance = false
lambda_selected_by_performance = false
center_refit = false

