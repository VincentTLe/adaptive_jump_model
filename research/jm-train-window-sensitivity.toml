schema_version = 1
experiment_id = "jm-train-window-sensitivity-001"
frozen_at_utc = "2026-07-14T00:10:30Z"
claim_class = "EXPLORATORY"
hypothesis = "A 4000-observation fixed-JM window improves Sharpe over the paper's 3000-observation window on all three frozen proxy markets."
primary_estimand = "sharpe_jm_4000_minus_sharpe_jm_3000"
extension_access = false
adaptive_experiment = false

[parent]
config_path = "research.toml"
config_sha256 = "8adb330565d64f8ed6edd986f0422dbba72585eda4efd34b0c1b41b95450d81b"
run_id = "fixed-baselines-8adb330565d6-3636939b525d-e9614112b234"
