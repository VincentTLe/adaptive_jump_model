question = "Does a pair-balanced signed lagged penalty preserve the fixed-JM binary hysteresis width while reducing lagged discount-attributable reversals without converting them into unconfirmed persistent states?"
hypothesis = "Keeping C_t(i,j)+C_t(j,i)=2*lambda preserves the binary dynamic program's hysteresis-interval width at 2*lambda, while signed lagged evidence can still tilt transition direction."
performance_claim_allowed = false
paper_replication_claim_allowed = false
new_model_claim_allowed = false
post_2023_access = false
provider_access = false
monthly_selection_allowed = false
result_driven_changes = [
  "The candidate was proposed after lagged-evidence performance and 2x2 attribution were known; this is explicitly post-result development work.",
  "The observed upper-lambda concentration and large state-path/choice interaction motivated preserving the pair-average transition scale exactly.",
  "Only beta=log(4), inherited from the completed lagged mechanism, is evaluated; beta=0 is an exact nesting oracle and there is no new beta search.",
  "Training normalization and two-observation confirmation remain unrun alternatives and cannot rescue this study.",
  "A pre-run scientific audit required a response-independent t+40 matched-anchor censor and exactly 20 post-entry dates so late balanced entries cannot earn persistence or latency credit with shorter exposure.",
]

