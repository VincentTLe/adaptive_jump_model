schema_version = 1
config_id = "shu-proxy-replication-v1"
frozen_at_utc = "2026-07-12T00:00:00Z"

[source_audit]
run_id = "20260712T012740Z"
path = "artifacts/data-source-audit/20260712T012740Z/audit.json"
sha256 = "548c80cbe09f48d1070b5fc23181cb7065bc84fd4d3dbfe457a0318576388ec4"

[study]
paper = "Shu, Yu, and Mulvey (2024), arXiv:2402.05272v3"
claim_class = "REPLICATION"
claim_label = "proxy replication"
requested_sample_start = "1970-01-01"
replication_cutoff = "2023-12-31"
extension_download_enabled = false
extension_results_enabled = false

[data_policy]
local_research_only = true
redistribute_raw_data = false
allow_definition_splicing = false
allow_synthetic_backfill = false
allow_forward_fill = false
allow_imputation = false
allow_outlier_removal = false
preserve_source_missing_values = true
preserve_raw_response = true
hash_algorithm = "sha256"

[oos_start]
requested = "1990-01-01"
fit_window_observations = 3000
online_validation_calendar_years = 8
rule = "max(requested, first_online_equity_date + 8 calendar years, cash_coverage_start)"
compute_from_downloaded_coverage = true

[storage]
raw_root = "data/raw"
processed_root = "data/processed"
artifact_root = "artifacts"

[[markets]]
id = "us"
name = "United States"
currency = "USD"
classification = "proxy_replication"
deviations = [
  "equity history starts after the paper's requested 1970 start",
  "paper source identifiers and cash-yield conversion are undisclosed",
]

[markets.equity]
provider = "yahoo"
adapter = "yfinance"
source_id = "^SP500TR"
canonical_url = "https://finance.yahoo.com/quote/%5ESP500TR/history/"
frequency = "daily"
timezone = "America/New_York"
value_field = "Close"
return_type = "gross_total_return_index_candidate"
classification = "definition_parity_candidate_with_shifted_coverage"
source_start_observed = "1988-01-04"
auto_adjust = false

[markets.cash]
provider = "fred"
source_id = "DTB3"
canonical_url = "https://fred.stlouisfed.org/series/DTB3"
retrieval_url = "https://fred.stlouisfed.org/graph/fredgraph.csv?id=DTB3"
frequency = "daily"
value_field = "DTB3"
unit = "percent_per_annum"
instrument = "3_month_us_treasury_bill_secondary_market_discount_basis"
classification = "definition_parity_candidate"
source_start_observed = "1954-01-04"
daily_alignment = "blocked_until_protocol_task"

