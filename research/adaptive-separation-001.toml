schema_version = 1
experiment_id = "adaptive-separation-001"
frozen_at_utc = "2026-07-17T07:33:25Z"
claim_class = "EXPLORATORY"
stage = "DEVELOPMENT_SAMPLE_MECHANISM_DIAGNOSTIC"
question = "Does causal training-prefix regime separation add out-of-market predictive information beyond the arrival-loss discount about whether a discount-attributable JM switch persists or reverses?"
hypothesis = "A discounted switch is less likely to reverse within 20 emitted signal days when the two fitted regimes are compact and well separated on the causal training prefix."
performance_claim_allowed = false
new_model_claim_allowed = false
extension_access = false
post_2023_access = false

