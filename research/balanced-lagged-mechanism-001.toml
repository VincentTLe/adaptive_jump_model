reversal_balanced_path = [0, 0, 1, 1, 1, 1, 1, 1]

[events]
unit = "own-rule discount-attributable candidate-path switch at fixed market, rule, beta, and positive raw lambda"
candidate_condition = "rule and fixed agree in source i on t-1; rule emits j!=i on t while fixed remains i"
terminal_condition = "rule terminal state is j and its unique final-step minimizing predecessor is i"
discount_condition = "C_t(i,j)<lambda0; lagged reverse cost equals lambda0; balanced reverse cost equals 2*lambda0-C_t(i,j)>lambda0"
ablation = "replace only day-t full off-diagonal matrix by fixed lambda0 while preserving all earlier own-rule penalties; unique terminal state must return to i"
tie_rule = "exclude and count exact terminal-state, final-predecessor, or ablated-state argmin ties"
horizon_candidate_dates = 20
matched_entry_search_candidate_dates = 20
matched_followup_candidate_dates = 20
matched_anchor_censor_candidate_dates = 40
censor = "require exactly 20 following candidate dates, all mapped to the event refit and no later than cutoff"
overlap_rule = "after admitting an event, suppress the next 20 dates within market x rule x beta x lambda"
whipsaw = "the rule returns to the source state at least once during the next 20 candidate dates"
persistent = "the rule remains in the destination state on every one of the next 20 candidate dates"
confirmed_early = "persistent event for which fixed JM first reaches the destination during the next 20 candidate dates"
unconfirmed_persistent = "persistent event for which fixed JM never reaches the destination during the next 20 candidate dates"
full_path_switch_count = "adjacent state changes whose destination date is on or after the market evaluation start through cutoff"
state_differences = "report balanced differences versus both fixed and sealed lagged paths"
anchor = "independently regenerate every sealed-lagged log4 event under the original terminal-tie, local-ablation, t+20 censor, and overlap rules; only after admission, retain anchors with t+40 available under the same event refit, producing a fixed response-independent matched denominator"
matched_window = "first_destination_h=-1 if balanced occupies destination j at anchor t-1, otherwise the minimum h in 0..20 with balanced state j, or missing if no such h; h=-1 is baseline occupancy with exactly t..t+19 observed, while h>=0 is followed on exactly t+h+1..t+h+20"
matched_categories = [
  "already_destination_whipsaw",
  "already_destination_persistent_confirmed",
  "already_destination_persistent_unconfirmed",
  "suppressed_no_entry",
  "enters_then_whipsaw",
  "enters_persistent_confirmed",
  "enters_persistent_unconfirmed"
]
matched_classification = "missing first_destination_h is suppressed_no_entry; otherwise whipsaw iff balanced returns to source i during its exact 20-date post-entry or post-baseline window; if no return it is persistent and splits confirmed/unconfirmed by whether fixed reaches j no later than that matched follow-end; first_destination_h=-1 selects already_destination categories and h>=0 selects enters categories"
matched_whipsaw = "already_destination_whipsaw or enters_then_whipsaw on any lagged anchor; never entering the destination is suppression, not a whipsaw"
matched_retained_confirmed_early = "on a lagged confirmed_early anchor, balanced reaches or already occupies the destination strictly before the original fixed_confirmation_h and never returns to source during its exact 20-date matched follow window"
matched_unconfirmed_persistent = "an already-destination or entered persistent category for which fixed never reaches destination by that balanced matched follow-end"
binary_partition = "states are binary; any response outside the seven exhaustive categories is an error"

[decision]
decision_beta_label = "log4"
numerical_tolerance = 1e-12
mechanical_prerequisites = "formula, missing-state semantics, beta-zero, pair balance, bounds, monotonicity, scale invariance, same-path objective bound, brute-force equivalence, prefix invariance, current-fit refit convention, and exact locked toy inputs and paths all pass"
nontrivial_vs_fixed = "pooled balanced state differences versus fixed are strictly positive"
nontrivial_vs_lagged = "pooled balanced state differences versus sealed lagged are strictly positive"
anchor_coverage = "eligible matched lagged-anchor count and original lagged confirmed_early count are each at least one in every market after the response-independent t+40 same-refit filter; a zero denominator fails"
market_switch_guard = "balanced full-path switch count summed across the eight positive-lambda paths is no greater than lagged in each market; this is conditional on the inherited grid"
own_market_whipsaw = "balanced own-event whipsaw count is no greater than lagged in each market"
own_pooled_whipsaw = "balanced own-event whipsaw count is strictly lower than lagged pooled"
matched_market_whipsaw = "over all eligible matched lagged anchors, balanced matched-whipsaw count is no greater than lagged whipsaw-anchor count in each market"
matched_pooled_whipsaw = "over all eligible matched lagged anchors, balanced matched-whipsaw count is strictly lower than lagged whipsaw-anchor count pooled"
matched_latency_by_market = "at least one original lagged confirmed_early eligible anchor is retained by balanced in every market"
matched_latency_fraction = "pooled retained-confirmed-early anchors divided by pooled original lagged confirmed_early eligible anchors is at least 0.5; this threshold is PREREGISTERED and UNCALIBRATED"
matched_lock_in_guard = "balanced matched unconfirmed-persistent count is no greater than original lagged unconfirmed-persistent eligible anchors pooled"
own_lock_in_guard = "balanced own-event unconfirmed-persistent count is no greater than lagged own-event count pooled"
study_supported = "all mechanical, both nontriviality, coverage, switch, own/matched whipsaw, latency, and own/matched lock-in conditions hold"
study_not_supported = "any condition fails; all raw mechanism results remain reportable"
result_scope = "support is conditional on eight inherited positive-lambda paths and authorizes no P&L study on the same three-market sample"

