claim_class = "EXPLORATORY"
analysis_label = "FIXED-BASELINE ASSUMPTION AUDIT"
hypothesis = "At least one predeclared grid, sampled HMM-initialization, tie, or bounded-startup axis changes a sampled HMM terminal state, a fixed-model selected path, or matched-sample proxy metrics."
primary_estimand = "paired_path_and_metric_deltas_within_predeclared_audit_blocks"
extension_access = false
adaptive_experiment = false
model_refitting = true
target = "audit of the local v7 causal proxy pipeline, not replication of the paper-published profits"
untested_undisclosed_settings = ["JM optimizer and refit phase", "HMM convergence and min_covar", "minimum-valid-return rule", "metric ddof", "initial-allocation convention"]
no_sensitivity_claim = "stability applies only to the tested axes and does not validate the undisclosed final-v3 grids"

[source]
