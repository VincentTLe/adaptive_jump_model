required_result = "supported"
required_selected_beta_label = "log4"

[model]
objective = "sum_t L_t(s_t) + sum_t>=1 C_t(s_(t-1),s_t)"
formula = "C_t(i,j)=lambda0*exp(-log(4)*tanh(max(L_(t-1)(i)-L_(t-1)(j),0)/q_train)) for i!=j; zero diagonal"
refit_boundary_convention = "on Jan/Jul refit dates, L_(t-1) is recomputed under the scaler and centers fitted through t, exactly as sealed by lagged-evidence-mechanism-001; the rule is causal at t but is not strictly F_(t-1)-predictable on those refit dates"
baseline = "fixed JM, exactly beta=0"
primary_challenger = "lagged evidence JM, beta=log(4)"
secondary_control = "arrival-day evidence JM, beta=log(4)"
beta = 1.3862943611198906
beta_provenance = "PREREGISTERED survivor of lagged-evidence-mechanism-001 without P&L access"
raw_lambda_grid = [0.0, 5.0, 15.0, 35.0, 70.0, 150.0, 300.0, 600.0, 1200.0]
lambda_provenance = "SOURCE_FIXED frozen v7; no expansion"
fitted_parameters = "sealed v7 scalers and centers already used to generate verified candidate states"
refit_or_state_regeneration = false

[protocol]
markets = ["us", "de", "jp"]
outer_start = { us = "2007-12-04", de = "2008-01-03", jp = "2009-05-07" }
outer_end = "2023-12-29"
sample = "exact sealed v7 fixed-JM delay-1 trade dates per market"
selection = "separate monthly lambda selection for fixed, arrival-log4, and lagged-log4 candidates"
selection_objective = "annualized strategy excess Sharpe over the previous eight calendar years"
minimum_valid_returns = 252
tie_rule = "lower lambda"
fit_window_observations = 3000
jm_refit_months = [1, 7]
primary_delay_trading_days = 1
signal_to_return_offset = 2
one_way_cost_bps = 10
turnover = "0.5*252*mean(abs(position change))"
metrics = ["sharpe", "maximum_drawdown", "turnover", "cash_fraction", "switch_count"]
boundary_rule = "descriptive only; cannot stop, hide, or change metrics"
provider_access = false

[decision]
primary_contrast = "lagged_log4_minus_fixed"
primary_estimand = "equal-weight mean of the three market net Sharpe deltas"
market_sign_rule = "strictly positive Sharpe delta"
study_supported = "primary_estimand > 0 and at least two of three market Sharpe deltas are strictly positive"
study_not_supported = "otherwise"
secondary_metrics = ["maximum_drawdown", "turnover", "cash_fraction", "switch_count"]
maximum_drawdown_reporting_deadband = 1e-9
raw_metrics_always_reported = true
arrival_control_cannot_change_primary_decision = true
selection_or_grid_change_after_results = false
non_finite_primary_metrics = "error; never silently omit a market from the three-market mean"

[verification]
source_inventory_exact = true
lagged_source_result_and_beta_exact = true
fixed_candidate_states_equal_parent = true
fixed_choices_signal_positions_and_trades_equal_parent = true
fixed_non_turnover_metrics_recompute_to_parent = true
turnover_recomputed_with_explicit_scale_0_5 = true
