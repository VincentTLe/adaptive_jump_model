[fixed_parent]
experiment_id = "fixed-baselines-001-v7"
config_path = "research.toml"
config_sha256 = "8adb330565d64f8ed6edd986f0422dbba72585eda4efd34b0c1b41b95450d81b"
run_id = "fixed-baselines-8adb330565d6-3636939b525d-e9614112b234"
run_inventory_sha256 = "08e42044c25ef80e92f4b565034652a6b87fe94de0e9122eee1a418395239d55"
data_manifest_sha256 = "3636939b525d604c5c4180d7e3abb6192b53b81a068f009ad6ca83a945e53a84"
data_cutoff = "2023-12-31"
allowed_market_files = ["features.csv"]

[scope]
markets = ["us", "de", "jp"]
evaluation_start = { us = "2007-12-04", de = "2008-01-03", jp = "2009-05-07" }
evaluation_end = "last available candidate date no later than 2023-12-31"
population = "exact sealed v7 per-market fixed-JM delay-1 outer sample dates"

[separation]
unit = "market x refit x raw lambda"
training_prefix_observations = 3000
feature_space = "stored v7 StandardScaler transform of dd_10, sortino_20, sortino_60"
center_distance = "D = Euclidean norm(mu0-mu1)"
partition = "A_k contains training rows whose loss to center k is strictly less than loss to the other center; exact ties are excluded"
state_radius = "rho_k = median Euclidean distance from rows in A_k to center k"
reliability = "R_train = D / (D + rho_0 + rho_1)"
properties = ["bounded in [0,1]", "label symmetric", "translation invariant", "orthogonal-transform invariant", "invariant to common positive distance scaling"]
invalid = "nonfinite center, empty A_0 or A_1, or nonpositive denominator"
objective_mismatch = "hard run failure; never convert a provenance error into an excluded geometry row"
invalid_gate_value = 0.0
invalid_primary_handling = "exclude and report count; do not impute in association analysis"
fixed_objective_abs_tolerance = 1e-8

[events]
betas = [0.6931471805599453, 1.3862943611198906]
raw_lambda_grid = [5.0, 15.0, 35.0, 70.0, 150.0, 300.0, 600.0, 1200.0]
unit = "discount-attributable candidate-path switch at fixed market, beta, and raw lambda"
candidate_condition = "adaptive and beta0 agree in state i on t-1; adaptive emits j!=i on t while beta0 remains i"
arrival_transition_condition = "the adaptive current-window terminal state is j and its exact final-step minimizing predecessor is i"
discount_condition = "C_t(i,j) < lambda0"
ablation = "replace only arrival day t off-diagonal costs by fixed lambda0 while preserving every earlier adaptive penalty; terminal state must become i"
terminal_tie_rule = "exclude and count an event if the terminal state, final predecessor, or ablated terminal state has an exact argmin tie"
event_sampling = "admit events before checking R_train validity; an admitted invalid-R event still starts its overlap-suppression block"
horizon_signal_days = 20
whipsaw = "adaptive emitted state returns to i at least once during the next 20 candidate-path dates"
persistent = "adaptive emitted state remains j on every one of the next 20 candidate-path dates"
secondary_outcome = "first date index within the horizon on which beta0 emits j"
censor = "require exactly 20 following candidate-path dates, all mapped to the event refit and no later than the cutoff"
overlap_rule = "after admitting an event, skip the next 20 dates in the same market x beta x lambda path"
refit_mapping = "latest fit_date <= signal_date for the exact market and lambda; an exact fit_date uses the new refit"

[prediction]
outcome = "whipsaw_20"
cross_validation = "leave one market out; train on two markets and test on the third"
training_market_weights = "each training market has equal total weight 1/2; events are equal within market"
log_discount = "natural log(lambda0 / C_t(i,j)) = beta*tanh((L_t(i)-L_t(j))/q_train), nonnegative on admitted events"
log_lambda0 = "natural log(lambda0)"
continuous_standardization = "equal-market-weighted training-fold mean and population standard deviation only; indicators remain unscaled"
baseline = ["log_discount", "log_lambda0", "beta_log4_indicator", "source_state_indicator"]
challenger_addition = "R_train"
estimator = "unpenalized logistic regression with intercept and analytic gradient"
optimizer = "L-BFGS-B"
optimizer_max_iterations = 10000
optimizer_gradient_tolerance = 1e-9
primary_score = "held-out Brier score"
secondary_score = "held-out log loss"
fold_validity = "training has both outcome classes; baseline and challenger augmented designs have full column rank; continuous scales are finite and nonzero; optimizer succeeds with finite coefficients and gradient infinity norm <= tolerance; held-out market has at least one valid event; a single held-out class remains scoreable"

[decision]
numerical_score_tolerance = 1e-12
standardized_coefficient_tolerance = 1e-12
supported = "R_train coefficient < -coefficient_tolerance in all three training folds; challenger mean market-equal Brier is lower than baseline by more than score tolerance; challenger Brier is lower by more than score tolerance in at least two held-out markets"
falsified = "R_train coefficient >= -coefficient_tolerance in at least two folds and challenger mean market-equal Brier does not improve beyond score tolerance"
inconclusive = "all other patterns, including any invalid fold or zero admitted events"
next_step_if_supported = "freeze a separate model study of C_t(i,j)=lambda0*exp(-beta*R_train*tanh(gap/q_train)); do not fit or test that gate here"

[verification]
source_inventory_exact = true
no_performance_file_access = true
all_dates_through_2023 = true
refit_join_complete_and_one_to_one = true
objective_reconstruction = true
formula_reconstruction = true
candidate_state_reconstruction = true
arrival_ablation_toy = true
terminal_predecessor_and_tie_audit = true
reliability_formula_toys = true
label_symmetry_toy = true
common_scale_invariance_toy = true
prefix_invariance = true

