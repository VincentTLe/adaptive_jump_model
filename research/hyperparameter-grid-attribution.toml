fresh_control_exit_code = 0
fresh_control_scientific_files_byte_identical = true
fresh_control_comparison_exclusions = ["run.json", "claim.json", "inventory.json", "checkpoint.pkl", "checkpoint.json"]

[samples]
parent_primary_delay_bounds = { us = "2007-12-04..2023-12-29", de = "2008-01-03..2023-12-29", jp = "2009-05-07..2023-12-29" }
comparison = "per_market_per_family_date intersection of complete rows across every member, model, and delay; derived bounds are recorded, not forced to parent_primary_delay_bounds"
audit_sample_aligner = "build every path on full history, join by market date, intersect complete metric rows across the family, then slice without recomputing turnover"
recompute_control_on_each_family_sample = true
cross_family_metric_deltas_allowed = false
core_grid_family = ["v7_expanded_control", "table3_jm", "table3_hmm", "table3_both"]
historical_v1_family = ["v7_expanded_control", "historical_v1_jm_only"]
source_union_jm_family = ["v7_expanded_control", "source_union_jm_only"]
source_union_hmm_family = ["v7_expanded_control", "source_union_hmm_only"]
tie_family = "both tie rules within each core-grid cell"
startup_family = "partial versus full startup on source-union HMM grid only"
core_pairs = ["table3_jm-v7_expanded_control", "table3_hmm-v7_expanded_control", "table3_both-v7_expanded_control"]
tie_pairs = ["v7_expanded_control:lower-higher", "table3_jm:lower-higher", "table3_hmm:lower-higher", "table3_both:lower-higher"]

[grids]
jm_table3_illustrated = [0, 5, 15, 35, 70, 150]
hmm_table3_illustrated = [0, 2, 4, 8, 20]
jm_expanded_project = [0, 5, 15, 35, 70, 150, 300, 600, 1200]
hmm_expanded_project = [0, 2, 4, 6, 8, 10, 20, 40, 80, 160, 320, 640, 1280, 2560]
jm_historical_v1_author = [10, 22, 50, 100, 220, 500, 1000]
jm_source_union = [0, 5, 10, 15, 22, 35, 50, 70, 100, 150, 220, 500, 1000]
hmm_source_union = [0, 2, 4, 6, 8, 20]
project_boundary_fraction_limit = 0.05
boundary_seals_metrics = false
expand_after_results = false

[[cells]]
id = "v7_expanded_control"
jm_grid = "expanded_project"
hmm_grid = "expanded_project"
role = "core_control"

[[cells]]
id = "table3_jm"
jm_grid = "table3_illustrated"
hmm_grid = "expanded_project"
